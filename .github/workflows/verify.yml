        run: ./scripts/run_with_timeout.sh MORPHO_PARITY_TARGET_VALIDATE_TIMEOUT_SEC 300 "Validate CI workflow artifact references" -- python3 scripts/check_ci_workflow_artifact_refs.py

      - name: Validate CI workflow upload-artifact failure policy
        run: ./scripts/run_with_timeout.sh MORPHO_PARITY_TARGET_VALIDATE_TIMEOUT_SEC 300 "Validate CI workflow upload-artifact failure policy" -- python3 scripts/check_ci_workflow_upload_artifact_policy.py

      - name: Validate CI workflow job references
        run: ./scripts/run_with_timeout.sh MORPHO_PARITY_TARGET_VALIDATE_TIMEOUT_SEC 300 "Validate CI workflow job references" -- python3 scripts/check_ci_workflow_job_refs.py

