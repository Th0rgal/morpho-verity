      - name: Validate CI workflow path references
        run: ./scripts/run_with_timeout.sh MORPHO_PARITY_TARGET_VALIDATE_TIMEOUT_SEC 300 "Validate CI workflow path references" -- python3 scripts/check_ci_workflow_path_refs.py

      - name: Validate CI workflow uses references
        run: ./scripts/run_with_timeout.sh MORPHO_PARITY_TARGET_VALIDATE_TIMEOUT_SEC 300 "Validate CI workflow uses references" -- python3 scripts/check_ci_workflow_uses_refs.py

