name: Verify Morpho Verity

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  VERIFY_LOCAL_ARTIFACT_ROOT: /srv/morpho-verity-ci-cache/artifacts
  VERIFY_STICKYDISK_ROOT: /srv/morpho-verity-ci-cache/stickydisk

jobs:
  verity-proofs:
    name: Lean proofs (Verity)
    runs-on: [self-hosted, linux, x64, morpho-verity]
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Load CI timeout defaults
        run: cat config/ci-timeout-defaults.env >> "$GITHUB_ENV"

      - name: Clean up stale local artifacts
        run: ./scripts/run_with_timeout.sh MORPHO_PARITY_TARGET_VALIDATE_TIMEOUT_SEC 300 "Clean up stale local artifacts" -- ./scripts/ci_local_persistence.sh cleanup --max-age-hours 24

      - name: Mount persistent elan cache
        env:
          CACHE_KEY_ELAN: elan-${{ hashFiles('lean-toolchain') }}
        run: |
          ./scripts/ci_local_persistence.sh mount \
            --root "$VERIFY_STICKYDISK_ROOT" \
            --key "$CACHE_KEY_ELAN" \
            --path "$HOME/.elan" \
            --fallback-key "elan-"

      - name: Mount persistent Lake packages
        env:
          CACHE_KEY_LAKE_PACKAGES: lake-packages-${{ hashFiles('lean-toolchain', 'lake-manifest.json', 'lakefile.lean') }}
        run: |
          ./scripts/ci_local_persistence.sh mount \
            --root "$VERIFY_STICKYDISK_ROOT" \
            --key "$CACHE_KEY_LAKE_PACKAGES" \
            --path .lake/packages \
            --fallback-key "lake-packages-"

      - name: Mount persistent Lake build
        env:
          CACHE_KEY_LAKE_BUILD: lake-build-${{ hashFiles('lean-toolchain', 'lake-manifest.json', 'lakefile.lean') }}
        run: |
          ./scripts/ci_local_persistence.sh mount \
            --root "$VERIFY_STICKYDISK_ROOT" \
            --key "$CACHE_KEY_LAKE_BUILD" \
            --path .lake/build \
            --fallback-key "lake-build-"

      - name: Install Lean toolchain
        run: ./scripts/run_with_timeout.sh MORPHO_LEAN_INSTALL_TIMEOUT_SEC 600 "Install Lean toolchain" -- ./scripts/install_lean.sh
      - name: Add elan bin to PATH
        run: echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      - name: Check Lean toolchain readiness
        run: ./scripts/run_with_timeout.sh MORPHO_PARITY_TARGET_VALIDATE_TIMEOUT_SEC 300 "Check Lean toolchain readiness" -- ./scripts/check_toolchain_readiness.sh --require lean

      - name: Clear stale Lake packages on verity pin change
        run: ./scripts/run_with_timeout.sh MORPHO_PARITY_TARGET_VALIDATE_TIMEOUT_SEC 300 "Clear stale Lake packages on verity pin change" -- ./scripts/clear_stale_verity_lake_state.sh

      - name: Build and check proofs
        run: ./scripts/run_with_timeout.sh MORPHO_VERITY_PROOFS_TIMEOUT_SEC 2400 "Build and check Lean proofs" -- lake build

      - name: Publish lean-workspace locally
        run: |
          staging="${RUNNER_TEMP}/lean-workspace-${{ github.run_id }}"
          mkdir -p "$staging/packages" "$staging/build"
          cp -a .lake/packages/. "$staging/packages/"
          cp -a .lake/build/. "$staging/build/"
          ./scripts/ci_local_persistence.sh publish \
            --run-id "${{ github.run_id }}" \
            --name lean-workspace \
            --path "$staging"

      - name: Upload verified Lean workspace
        uses: actions/upload-artifact@v4
        with:
          name: lean-workspace
          path: |
            .lake/packages
            .lake/build
          if-no-files-found: error
          retention-days: 1

  compiler-link:
    name: Compiler FFI link
    runs-on: [self-hosted, linux, x64, morpho-verity]
    needs: [verity-proofs]
    timeout-minutes: 360
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Load CI timeout defaults
        run: cat config/ci-timeout-defaults.env >> "$GITHUB_ENV"

      - name: Restore lean-workspace (local)
        id: local-restore-workspace
        run: |
          source_dir="${VERIFY_LOCAL_ARTIFACT_ROOT}/${{ github.run_id }}/lean-workspace"
          if [ -f "$source_dir/.ready" ]; then
            rm -rf .lake/packages .lake/build
            mkdir -p .lake/packages .lake/build
            cp -a "$source_dir/packages/." .lake/packages/
            cp -a "$source_dir/build/." .lake/build/
            echo "hit=true" >> "$GITHUB_OUTPUT"
          else
            echo "hit=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download verified Lean workspace (fallback)
        if: steps.local-restore-workspace.outputs.hit != 'true'
        uses: actions/download-artifact@v4
        with:
          name: lean-workspace
          path: .lake

      - name: Mount persistent elan cache
        env:
          CACHE_KEY_ELAN: elan-${{ hashFiles('lean-toolchain') }}
        run: |
          ./scripts/ci_local_persistence.sh mount \
            --root "$VERIFY_STICKYDISK_ROOT" \
            --key "$CACHE_KEY_ELAN" \
            --path "$HOME/.elan" \
            --fallback-key "elan-"

      - name: Install Lean toolchain
        run: ./scripts/run_with_timeout.sh MORPHO_LEAN_INSTALL_TIMEOUT_SEC 600 "Install Lean toolchain" -- ./scripts/install_lean.sh
      - name: Add elan bin to PATH
        run: echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      - name: Clear stale Lake packages on verity pin change
        run: ./scripts/run_with_timeout.sh MORPHO_PARITY_TARGET_VALIDATE_TIMEOUT_SEC 300 "Clear stale Lake packages on verity pin change" -- ./scripts/clear_stale_verity_lake_state.sh

      - name: Build compiler executable (FFI link)
        run: ./scripts/run_with_timeout.sh MORPHO_COMPILER_LINK_TIMEOUT_SEC 19800 "Build compiler executable (FFI link)" -- lake build morpho-verity-compiler

      - name: Publish compiler-executable locally
        run: |
          staging="${RUNNER_TEMP}/compiler-executable-${{ github.run_id }}"
          mkdir -p "$staging"
          cp .lake/build/bin/morpho-verity-compiler "$staging/"
          ./scripts/ci_local_persistence.sh publish \
            --run-id "${{ github.run_id }}" \
            --name compiler-executable \
            --path "$staging"

      - name: Upload compiler executable
        uses: actions/upload-artifact@v4
        with:
          name: compiler-executable
          path: .lake/build/bin/morpho-verity-compiler
          if-no-files-found: error
          retention-days: 1

  parity-target:
    name: Parity target tuple check
    runs-on: [self-hosted, linux, x64, morpho-verity]
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 1
          persist-credentials: false
          submodules: recursive

      - name: Load CI timeout defaults
        run: cat config/ci-timeout-defaults.env >> "$GITHUB_ENV"

      - name: Mount persistent elan cache
        env:
          CACHE_KEY_ELAN: elan-${{ hashFiles('lean-toolchain') }}
        run: |
          ./scripts/ci_local_persistence.sh mount \
            --root "$VERIFY_STICKYDISK_ROOT" \
            --key "$CACHE_KEY_ELAN" \
            --path "$HOME/.elan" \
            --fallback-key "elan-"

      - name: Mount persistent Lake packages
        env:
          CACHE_KEY_LAKE_PACKAGES: lake-packages-${{ hashFiles('lean-toolchain', 'lake-manifest.json', 'lakefile.lean') }}
        run: |
          ./scripts/ci_local_persistence.sh mount \
            --root "$VERIFY_STICKYDISK_ROOT" \
            --key "$CACHE_KEY_LAKE_PACKAGES" \
            --path .lake/packages \
            --fallback-key "lake-packages-"

      - name: Mount persistent Lake build
        env:
          CACHE_KEY_LAKE_BUILD: lake-build-${{ hashFiles('lean-toolchain', 'lake-manifest.json', 'lakefile.lean') }}
        run: |
          ./scripts/ci_local_persistence.sh mount \
            --root "$VERIFY_STICKYDISK_ROOT" \
            --key "$CACHE_KEY_LAKE_BUILD" \
            --path .lake/build \
            --fallback-key "lake-build-"

      - name: Add elan bin to PATH
        run: echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Mount persistent solc-select cache
        env:
          CACHE_KEY_SOLC: solc-select-${{ hashFiles('config/parity-target.json') }}
        run: |
          ./scripts/ci_local_persistence.sh mount \
            --root "$VERIFY_STICKYDISK_ROOT" \
            --key "$CACHE_KEY_SOLC" \
            --path "$HOME/.solc-select" \
            --fallback-key "solc-select-"

      - name: Install solc
        run: ./scripts/run_with_timeout.sh MORPHO_SOLC_INSTALL_TIMEOUT_SEC 600 "Install solc" -- ./scripts/install_solc.sh 0.8.28
      - name: Check solc toolchain readiness
        run: ./scripts/run_with_timeout.sh MORPHO_PARITY_TARGET_VALIDATE_TIMEOUT_SEC 300 "Check solc toolchain readiness" -- ./scripts/check_toolchain_readiness.sh --require solc

      - name: Validate verity pin sync
        run: ./scripts/run_with_timeout.sh MORPHO_PARITY_TARGET_VALIDATE_TIMEOUT_SEC 300 "Validate verity pin sync" -- python3 scripts/check_verity_pin_sync.py

      - name: Validate verity pin provenance
        run: ./scripts/run_with_timeout.sh MORPHO_PARITY_TARGET_VALIDATE_TIMEOUT_SEC 300 "Validate verity pin provenance" -- python3 scripts/check_verity_pin_provenance.py

      - name: Validate pinned parity target
        run: ./scripts/run_with_timeout.sh MORPHO_PARITY_TARGET_VALIDATE_TIMEOUT_SEC 300 "Validate pinned parity target" -- python3 scripts/check_parity_target.py

      - name: Validate macro migration selector surface
        run: ./scripts/run_with_timeout.sh MORPHO_PARITY_TARGET_VALIDATE_TIMEOUT_SEC 300 "Validate macro migration selector surface" -- python3 scripts/check_macro_migration_surface.py --json-out out/parity-target/macro-migration-surface.json

      - name: Validate morpho selector block sync
        run: ./scripts/run_with_timeout.sh MORPHO_PARITY_TARGET_VALIDATE_TIMEOUT_SEC 300 "Validate morpho selector block sync" -- python3 scripts/check_morpho_selectors_sync.py

      - name: Validate macro migration blockers baseline
        run: ./scripts/run_with_timeout.sh MORPHO_PARITY_TARGET_VALIDATE_TIMEOUT_SEC 300 "Validate macro migration blockers baseline" -- python3 scripts/check_macro_migration_blockers.py --json-out out/parity-target/macro-migration-blockers.json

      - name: Validate macro migration selector slice
        run: ./scripts/run_with_timeout.sh MORPHO_PARITY_TARGET_VALIDATE_TIMEOUT_SEC 300 "Validate macro migration selector slice" -- python3 scripts/check_macro_migration_slice.py --json-out out/parity-target/macro-migration-slice.json

      - name: Validate morpho generated boundary
        run: ./scripts/run_with_timeout.sh MORPHO_PARITY_TARGET_VALIDATE_TIMEOUT_SEC 300 "Validate morpho generated boundary" -- python3 scripts/check_morpho_generated_boundary.py

      - name: Validate CI timeout defaults sync
        run: ./scripts/run_with_timeout.sh MORPHO_PARITY_TARGET_VALIDATE_TIMEOUT_SEC 300 "Validate CI timeout defaults sync" -- python3 scripts/check_ci_timeout_defaults.py

      - name: Validate CI timeout budgets fit inside job limits
        run: ./scripts/run_with_timeout.sh MORPHO_PARITY_TARGET_VALIDATE_TIMEOUT_SEC 300 "Validate CI timeout budgets fit inside job limits" -- python3 scripts/check_ci_timeout_job_budget_fit.py

      - name: Validate CI workflow job timeout policy
        run: ./scripts/run_with_timeout.sh MORPHO_PARITY_TARGET_VALIDATE_TIMEOUT_SEC 300 "Validate CI workflow job timeout policy" -- python3 scripts/check_ci_workflow_job_timeouts.py

