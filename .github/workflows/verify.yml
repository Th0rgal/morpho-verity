name: Verify Morpho Verity

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verity-build:
    name: Lean build (Verity)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Load CI timeout defaults
        run: cat config/ci-timeout-defaults.env >> "$GITHUB_ENV"

      - name: Restore Lean/Lake cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.elan
            ~/.lake
            .lake/packages
            .lake/build
          key: ${{ runner.os }}-lean-lake-${{ hashFiles('lean-toolchain', 'lake-manifest.json', 'lakefile.lean') }}
          restore-keys: |
            ${{ runner.os }}-lean-lake-

      - name: Install Lean toolchain
        run: ./scripts/run_with_timeout.sh MORPHO_LEAN_INSTALL_TIMEOUT_SEC 600 "Install Lean toolchain" -- ./scripts/install_lean.sh
      - name: Add elan bin to PATH
        run: echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      - name: Check Lean toolchain readiness
        run: ./scripts/run_with_timeout.sh MORPHO_PARITY_TARGET_VALIDATE_TIMEOUT_SEC 300 "Check Lean toolchain readiness" -- ./scripts/check_toolchain_readiness.sh --require lean

      - name: Clear stale Lake packages on verity pin change
        run: ./scripts/run_with_timeout.sh MORPHO_PARITY_TARGET_VALIDATE_TIMEOUT_SEC 300 "Clear stale Lake packages on verity pin change" -- ./scripts/clear_stale_verity_lake_state.sh

      - name: Fetch prebuilt Mathlib cache
        run: env -u CI ./scripts/run_with_timeout.sh MORPHO_VERITY_BUILD_TIMEOUT_SEC 5100 "Fetch prebuilt Mathlib cache" -- lake exe cache get

      # CI is unset for the build so Mathlib's `says` tactic does not switch into
      # verify mode (it keys off the CI env var). says-verify re-runs `simp?` and
      # fails on upstream simp-set drift in Mathlib's own CauSeq/Basic.lean - a
      # failure unrelated to this repo. With CI unset the build matches the local
      # toolchain build, which passes.
      - name: Build Verity contract
        run: env -u CI ./scripts/run_with_timeout.sh MORPHO_VERITY_BUILD_TIMEOUT_SEC 5100 "Build Verity contract" -- lake build

      - name: Build Midnight Verity contract
        run: env -u CI ./scripts/run_with_timeout.sh MORPHO_VERITY_BUILD_TIMEOUT_SEC 5100 "Build Midnight Verity contract" -- lake build Midnight

      - name: Upload built Lean workspace
        uses: actions/upload-artifact@v4
        with:
          name: lean-workspace
          path: |
            .lake/packages
            .lake/build
          if-no-files-found: error
          retention-days: 1

      - name: Save Lean/Lake cache
        if: success() && github.ref == 'refs/heads/master'
        uses: actions/cache/save@v4
        with:
          path: |
            ~/.elan
            ~/.lake
            .lake/packages
            .lake/build
          key: ${{ runner.os }}-lean-lake-${{ hashFiles('lean-toolchain', 'lake-manifest.json', 'lakefile.lean') }}

  compiler-link:
    name: Compiler FFI link
    runs-on: ubuntu-latest
    needs: [verity-build]
    timeout-minutes: 360
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 1
          persist-credentials: true

      - name: Load CI timeout defaults
        run: cat config/ci-timeout-defaults.env >> "$GITHUB_ENV"

      - name: Download built Lean workspace
        uses: actions/download-artifact@v4
        with:
          name: lean-workspace
          path: .lake

      - name: Install Lean toolchain
        run: ./scripts/run_with_timeout.sh MORPHO_LEAN_INSTALL_TIMEOUT_SEC 600 "Install Lean toolchain" -- ./scripts/install_lean.sh
      - name: Add elan bin to PATH
        run: echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      - name: Clear stale Lake packages on verity pin change
        run: ./scripts/run_with_timeout.sh MORPHO_PARITY_TARGET_VALIDATE_TIMEOUT_SEC 300 "Clear stale Lake packages on verity pin change" -- ./scripts/clear_stale_verity_lake_state.sh

      - name: Build compiler executable (FFI link)
        run: ./scripts/run_with_timeout.sh MORPHO_COMPILER_LINK_TIMEOUT_SEC 19800 "Build compiler executable (FFI link)" -- lake build morpho-verity-compiler

      - name: Upload compiler executable
        uses: actions/upload-artifact@v4
        with:
          name: compiler-executable
          path: .lake/build/bin/morpho-verity-compiler
          if-no-files-found: error
          retention-days: 1

  parity-target:
    name: Parity target tuple check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 1
          persist-credentials: false
          submodules: recursive

      - name: Load CI timeout defaults
        run: cat config/ci-timeout-defaults.env >> "$GITHUB_ENV"

      - name: Restore solc-select cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.solc-select
          key: ${{ runner.os }}-solc-select-${{ hashFiles('config/parity-target.json') }}
          restore-keys: |
            ${{ runner.os }}-solc-select-

      - name: Install solc
        run: ./scripts/run_with_timeout.sh MORPHO_SOLC_INSTALL_TIMEOUT_SEC 600 "Install solc" -- ./scripts/install_solc.sh 0.8.28
      - name: Check solc toolchain readiness
        run: ./scripts/run_with_timeout.sh MORPHO_PARITY_TARGET_VALIDATE_TIMEOUT_SEC 300 "Check solc toolchain readiness" -- ./scripts/check_toolchain_readiness.sh --require solc

      - name: Validate verity pin sync
        run: ./scripts/run_with_timeout.sh MORPHO_PARITY_TARGET_VALIDATE_TIMEOUT_SEC 300 "Validate verity pin sync" -- python3 scripts/check_verity_pin_sync.py

      - name: Validate pinned parity target
        run: ./scripts/run_with_timeout.sh MORPHO_PARITY_TARGET_VALIDATE_TIMEOUT_SEC 300 "Validate pinned parity target" -- python3 scripts/check_parity_target.py

      - name: Validate morpho artifact boundary
        run: ./scripts/run_with_timeout.sh MORPHO_PARITY_TARGET_VALIDATE_TIMEOUT_SEC 300 "Validate morpho artifact boundary" -- python3 scripts/check_morpho_artifact_boundary.py

      - name: Validate morpho event surface sync
        run: ./scripts/run_with_timeout.sh MORPHO_PARITY_TARGET_VALIDATE_TIMEOUT_SEC 300 "Validate morpho event surface sync" -- python3 scripts/check_morpho_event_surface.py

      - name: Validate morpho midnight mapping
        run: ./scripts/run_with_timeout.sh MORPHO_PARITY_TARGET_VALIDATE_TIMEOUT_SEC 300 "Validate morpho midnight mapping" -- python3 scripts/check_morpho_midnight_mapping.py

      - name: Validate morpho midnight artifact boundary
        run: ./scripts/run_with_timeout.sh MORPHO_PARITY_TARGET_VALIDATE_TIMEOUT_SEC 300 "Validate morpho midnight artifact boundary" -- python3 scripts/check_morpho_midnight_artifact_boundary.py

      - name: Validate CI timeout defaults sync
        run: ./scripts/run_with_timeout.sh MORPHO_PARITY_TARGET_VALIDATE_TIMEOUT_SEC 300 "Validate CI timeout defaults sync" -- python3 scripts/check_ci_timeout_defaults.py

      - name: Validate CI timeout budgets fit inside job limits
        run: ./scripts/run_with_timeout.sh MORPHO_PARITY_TARGET_VALIDATE_TIMEOUT_SEC 300 "Validate CI timeout budgets fit inside job limits" -- python3 scripts/check_ci_timeout_job_budget_fit.py

      - name: Validate CI workflow job timeout policy
        run: ./scripts/run_with_timeout.sh MORPHO_PARITY_TARGET_VALIDATE_TIMEOUT_SEC 300 "Validate CI workflow job timeout policy" -- python3 scripts/check_ci_workflow_job_timeouts.py

      - name: Validate CI workflow permissions policy
        run: ./scripts/run_with_timeout.sh MORPHO_PARITY_TARGET_VALIDATE_TIMEOUT_SEC 300 "Validate CI workflow permissions policy" -- python3 scripts/check_ci_workflow_permissions.py

      - name: Validate CI workflow trigger policy
        run: ./scripts/run_with_timeout.sh MORPHO_PARITY_TARGET_VALIDATE_TIMEOUT_SEC 300 "Validate CI workflow trigger policy" -- python3 scripts/check_ci_workflow_triggers.py

      - name: Validate CI workflow concurrency policy
        run: ./scripts/run_with_timeout.sh MORPHO_PARITY_TARGET_VALIDATE_TIMEOUT_SEC 300 "Validate CI workflow concurrency policy" -- python3 scripts/check_ci_workflow_concurrency.py

      - name: Validate CI workflow continue-on-error policy
        run: ./scripts/run_with_timeout.sh MORPHO_PARITY_TARGET_VALIDATE_TIMEOUT_SEC 300 "Validate CI workflow continue-on-error policy" -- python3 scripts/check_ci_workflow_continue_on_error.py

      - name: Validate CI script-test coverage sync
        run: ./scripts/run_with_timeout.sh MORPHO_PARITY_TARGET_VALIDATE_TIMEOUT_SEC 300 "Validate CI script-test coverage sync" -- python3 scripts/check_ci_test_coverage.py

      - name: Validate CI check-script coverage sync
        run: ./scripts/run_with_timeout.sh MORPHO_PARITY_TARGET_VALIDATE_TIMEOUT_SEC 300 "Validate CI check-script coverage sync" -- python3 scripts/check_ci_check_coverage.py

      - name: Validate CI workflow script references
        run: ./scripts/run_with_timeout.sh MORPHO_PARITY_TARGET_VALIDATE_TIMEOUT_SEC 300 "Validate CI workflow script references" -- python3 scripts/check_ci_workflow_script_refs.py

      - name: Validate CI workflow artifact references
        run: ./scripts/run_with_timeout.sh MORPHO_PARITY_TARGET_VALIDATE_TIMEOUT_SEC 300 "Validate CI workflow artifact references" -- python3 scripts/check_ci_workflow_artifact_refs.py

      - name: Validate CI workflow upload-artifact failure policy
        run: ./scripts/run_with_timeout.sh MORPHO_PARITY_TARGET_VALIDATE_TIMEOUT_SEC 300 "Validate CI workflow upload-artifact failure policy" -- python3 scripts/check_ci_workflow_upload_artifact_policy.py

      - name: Validate CI workflow job references
        run: ./scripts/run_with_timeout.sh MORPHO_PARITY_TARGET_VALIDATE_TIMEOUT_SEC 300 "Validate CI workflow job references" -- python3 scripts/check_ci_workflow_job_refs.py

      - name: Validate CI workflow hashFiles() references
        run: ./scripts/run_with_timeout.sh MORPHO_PARITY_TARGET_VALIDATE_TIMEOUT_SEC 300 "Validate CI workflow hashFiles() references" -- python3 scripts/check_ci_workflow_hashfiles_refs.py

      - name: Validate CI workflow working-directory references
        run: ./scripts/run_with_timeout.sh MORPHO_PARITY_TARGET_VALIDATE_TIMEOUT_SEC 300 "Validate CI workflow working-directory references" -- python3 scripts/check_ci_workflow_working_directory_refs.py

      - name: Validate CI workflow path references
        run: ./scripts/run_with_timeout.sh MORPHO_PARITY_TARGET_VALIDATE_TIMEOUT_SEC 300 "Validate CI workflow path references" -- python3 scripts/check_ci_workflow_path_refs.py

      - name: Validate CI workflow uses references
        run: ./scripts/run_with_timeout.sh MORPHO_PARITY_TARGET_VALIDATE_TIMEOUT_SEC 300 "Validate CI workflow uses references" -- python3 scripts/check_ci_workflow_uses_refs.py

      - name: Validate CI workflow action allowlist
        run: ./scripts/run_with_timeout.sh MORPHO_PARITY_TARGET_VALIDATE_TIMEOUT_SEC 300 "Validate CI workflow action allowlist" -- python3 scripts/check_ci_workflow_action_allowlist.py

      - name: Validate CI workflow checkout policy
        run: ./scripts/run_with_timeout.sh MORPHO_PARITY_TARGET_VALIDATE_TIMEOUT_SEC 300 "Validate CI workflow checkout policy" -- python3 scripts/check_ci_workflow_checkout_policy.py

      - name: Validate CI workflow cache restore-keys
        run: ./scripts/run_with_timeout.sh MORPHO_PARITY_TARGET_VALIDATE_TIMEOUT_SEC 300 "Validate CI workflow cache restore-keys" -- python3 scripts/check_ci_workflow_cache_restore_keys.py

      - name: Validate CI timeout-wrapper coverage sync
        run: ./scripts/run_with_timeout.sh MORPHO_PARITY_TARGET_VALIDATE_TIMEOUT_SEC 300 "Validate CI timeout-wrapper coverage sync" -- python3 scripts/check_ci_timeout_wrapper_coverage.py

      - name: Validate CI script timeout-wrapper coverage sync
        run: ./scripts/run_with_timeout.sh MORPHO_PARITY_TARGET_VALIDATE_TIMEOUT_SEC 300 "Validate CI script timeout-wrapper coverage sync" -- python3 scripts/check_ci_script_timeout_wrapper_coverage.py

      - name: Validate shell script executable bit integrity
        run: ./scripts/run_with_timeout.sh MORPHO_PARITY_TARGET_VALIDATE_TIMEOUT_SEC 300 "Validate shell script executable bit integrity" -- python3 scripts/check_shell_script_executable.py

      - name: Validate duplicate top-level Python defs
        run: ./scripts/run_with_timeout.sh MORPHO_PARITY_TARGET_VALIDATE_TIMEOUT_SEC 300 "Validate duplicate top-level Python defs" -- python3 scripts/check_duplicate_top_level_defs.py

      - name: Validate no-arg Python check scripts from another cwd
        run: ./scripts/run_with_timeout.sh MORPHO_PARITY_TARGET_VALIDATE_TIMEOUT_SEC 300 "Validate no-arg Python check scripts from another cwd" -- python3 scripts/check_no_arg_check_scripts.py

      - name: Validate no-arg shell check scripts from another cwd
        run: ./scripts/run_with_timeout.sh MORPHO_PARITY_TARGET_VALIDATE_TIMEOUT_SEC 300 "Validate no-arg shell check scripts from another cwd" -- python3 scripts/check_no_arg_shell_check_scripts.py

      - name: Validate script-test pairing
        run: ./scripts/run_with_timeout.sh MORPHO_PARITY_TARGET_VALIDATE_TIMEOUT_SEC 300 "Validate script-test pairing" -- python3 scripts/check_script_test_pairs.py

      - name: Validate parity EDSL-only naming
        run: ./scripts/run_with_timeout.sh MORPHO_PARITY_TARGET_VALIDATE_TIMEOUT_SEC 300 "Validate parity EDSL-only naming" -- python3 scripts/check_parity_edsl_naming.py

      - name: Validate artifact layout boundary
        run: ./scripts/run_with_timeout.sh MORPHO_PARITY_TARGET_VALIDATE_TIMEOUT_SEC 300 "Validate artifact layout boundary" -- python3 scripts/check_artifact_layout_boundary.py

      - name: Validate markdown repo links
        run: ./scripts/run_with_timeout.sh MORPHO_PARITY_TARGET_VALIDATE_TIMEOUT_SEC 300 "Validate markdown repo links" -- python3 scripts/check_markdown_repo_links.py

      - name: Run parity-target parser regression tests
        run: ./scripts/run_with_timeout.sh MORPHO_PARITY_TARGET_TEST_TIMEOUT_SEC 900 "Parity-target parser regression tests" -- python3 scripts/test_check_parity_target.py

      - name: Run Python script unit tests (discovery)
        run: ./scripts/run_with_timeout.sh MORPHO_PARITY_TARGET_TEST_TIMEOUT_SEC 900 "Python script unit tests (discovery)" -- python3 -m unittest discover -s scripts -p 'test_*.py'

      - name: Run shell script unit tests (glob)
        run: |
          set -euo pipefail
          for t in scripts/test_*.sh; do
            ./scripts/run_with_timeout.sh MORPHO_PARITY_TARGET_TEST_TIMEOUT_SEC 900 "Shell script unit test: ${t}" -- "./${t}"
          done

  yul-identity-report:
    name: Yul identity gap report (Solidity vs Verity)
    runs-on: ubuntu-latest
    needs: [verity-build, parity-target, verity-compiled-tests]
    timeout-minutes: 480
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 1
          persist-credentials: false
          submodules: recursive

      - name: Load CI timeout defaults
        run: cat config/ci-timeout-defaults.env >> "$GITHUB_ENV"

      - name: Restore Lean/Lake cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.elan
            ~/.lake
            .lake/packages
            .lake/build
          key: ${{ runner.os }}-lean-lake-${{ hashFiles('lean-toolchain', 'lake-manifest.json', 'lakefile.lean') }}
          restore-keys: |
            ${{ runner.os }}-lean-lake-

      - name: Install Lean toolchain
        run: ./scripts/run_with_timeout.sh MORPHO_LEAN_INSTALL_TIMEOUT_SEC 600 "Install Lean toolchain" -- ./scripts/install_lean.sh
      - name: Add elan bin to PATH
        run: echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      - name: Clear stale Lake packages on verity pin change
        run: ./scripts/run_with_timeout.sh MORPHO_PARITY_TARGET_VALIDATE_TIMEOUT_SEC 300 "Clear stale Lake packages on verity pin change" -- ./scripts/clear_stale_verity_lake_state.sh

      - name: Restore Foundry cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.foundry/cache
            ~/.foundry/bin
            ~/.svm
            morpho-blue/cache
            morpho-blue/out
          key: ${{ runner.os }}-foundry-${{ hashFiles('morpho-blue/foundry.toml', 'config/parity-target.json') }}
          restore-keys: |
            ${{ runner.os }}-foundry-

      - name: Install Foundry
        run: ./scripts/run_with_timeout.sh MORPHO_FOUNDRY_INSTALL_TIMEOUT_SEC 600 "Install Foundry" -- ./scripts/install_foundry.sh

      - name: Restore solc-select cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.solc-select
          key: ${{ runner.os }}-solc-select-${{ hashFiles('config/parity-target.json') }}
          restore-keys: |
            ${{ runner.os }}-solc-select-

      - name: Install solc
        run: ./scripts/run_with_timeout.sh MORPHO_SOLC_INSTALL_TIMEOUT_SEC 600 "Install solc" -- ./scripts/install_solc.sh 0.8.28
      - name: Check full toolchain readiness
        run: ./scripts/run_with_timeout.sh MORPHO_PARITY_TARGET_VALIDATE_TIMEOUT_SEC 300 "Check full toolchain readiness" -- ./scripts/check_toolchain_readiness.sh --require lean --require foundry --require solc

      - name: Download validated EDSL artifact bundle
        uses: actions/download-artifact@v4
        with:
          name: verity-edsl-artifacts
          path: out/parity-shared

      - name: Validate downloaded EDSL artifact bundle
        run: ./scripts/run_with_timeout.sh MORPHO_PARITY_TARGET_VALIDATE_TIMEOUT_SEC 300 "Validate downloaded EDSL artifact bundle" -- python3 scripts/check_prepared_verity_artifact_bundle.py --artifact-dir out/parity-shared --require-rewrite

      - name: Generate Yul identity report
        run: ./scripts/run_with_timeout.sh MORPHO_YUL_IDENTITY_TIMEOUT_SEC 13800 "Yul identity report" -- python3 scripts/report_yul_identity_gap.py --max-diff-lines 12000 --enforce-configured-gate --out-dir out/parity-target/morpho-blue
        env:
          MORPHO_SOLIDITY_IR_BUILD_TIMEOUT_SEC: "900"
          MORPHO_VERITY_PREP_TIMEOUT_SEC: "13200"
          MORPHO_VERITY_PREPARED_ARTIFACT_DIR: out/parity-shared

      - name: Generate Midnight Yul identity report
        run: ./scripts/run_with_timeout.sh MORPHO_YUL_IDENTITY_TIMEOUT_SEC 13800 "Midnight Yul identity report" -- python3 scripts/report_yul_identity_gap.py --midnight --max-diff-lines 12000 --enforce-configured-gate --out-dir out/parity-target/morpho-midnight
        env:
          MIDNIGHT_SOLIDITY_IR_BUILD_TIMEOUT_SEC: "1200"

      - name: Upload Yul identity artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: yul-identity-report
          path: out/parity-target
          if-no-files-found: error

  solidity-tests:
    name: Solidity tests (Foundry)
    runs-on: ubuntu-latest
    needs: [verity-build, parity-target]
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 1
          persist-credentials: false
          submodules: recursive

      - name: Load CI timeout defaults
        run: cat config/ci-timeout-defaults.env >> "$GITHUB_ENV"

      - name: Restore Foundry cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.foundry/cache
            ~/.foundry/bin
            ~/.svm
            morpho-blue/cache
            morpho-blue/out
          key: ${{ runner.os }}-foundry-${{ hashFiles('morpho-blue/foundry.toml', 'config/parity-target.json') }}
          restore-keys: |
            ${{ runner.os }}-foundry-

      - name: Install Foundry
        run: ./scripts/run_with_timeout.sh MORPHO_FOUNDRY_INSTALL_TIMEOUT_SEC 600 "Install Foundry" -- ./scripts/install_foundry.sh
      - name: Check Foundry readiness
        run: ./scripts/run_with_timeout.sh MORPHO_PARITY_TARGET_VALIDATE_TIMEOUT_SEC 300 "Check Foundry readiness" -- ./scripts/check_toolchain_readiness.sh --require foundry

      - name: Run Morpho Blue tests
        working-directory: morpho-blue
        run: ../scripts/run_with_timeout.sh MORPHO_SOLIDITY_TEST_TIMEOUT_SEC 5100 "Morpho Blue Solidity tests" -- forge test -vvv
        env:
          FOUNDRY_FUZZ_RUNS: ${{ github.event_name == 'pull_request' && '1000' || '10000' }}
          FOUNDRY_FUZZ_MAX_TEST_REJECTS: 500000
          FOUNDRY_INVARIANT_RUNS: ${{ github.event_name == 'pull_request' && '1000' || '10000' }}
          FOUNDRY_INVARIANT_DEPTH: 32

  verity-compiler-artifacts:
    name: Verity compiler artifact prep
    runs-on: ubuntu-latest
    needs: [verity-build, parity-target, compiler-link]
    timeout-minutes: 240
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 1
          persist-credentials: false
          submodules: recursive

      - name: Load CI timeout defaults
        run: cat config/ci-timeout-defaults.env >> "$GITHUB_ENV"

      - name: Download built Lean workspace
        uses: actions/download-artifact@v4
        with:
          name: lean-workspace
          path: .lake

      - name: Download compiler executable
        uses: actions/download-artifact@v4
        with:
          name: compiler-executable
          path: .lake/build/bin

      - name: Mark compiler executable
        run: chmod +x .lake/build/bin/morpho-verity-compiler

      - name: Install Lean toolchain
        run: ./scripts/run_with_timeout.sh MORPHO_LEAN_INSTALL_TIMEOUT_SEC 600 "Install Lean toolchain" -- ./scripts/install_lean.sh
      - name: Add elan bin to PATH
        run: echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      - name: Clear stale Lake packages on verity pin change
        run: ./scripts/run_with_timeout.sh MORPHO_PARITY_TARGET_VALIDATE_TIMEOUT_SEC 300 "Clear stale Lake packages on verity pin change" -- ./scripts/clear_stale_verity_lake_state.sh

      - name: Restore Foundry cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.foundry/cache
            ~/.foundry/bin
            ~/.svm
            morpho-blue/cache
            morpho-blue/out
          key: ${{ runner.os }}-foundry-${{ hashFiles('morpho-blue/foundry.toml', 'config/parity-target.json') }}
          restore-keys: |
            ${{ runner.os }}-foundry-

      - name: Install Foundry
        run: ./scripts/run_with_timeout.sh MORPHO_FOUNDRY_INSTALL_TIMEOUT_SEC 600 "Install Foundry" -- ./scripts/install_foundry.sh

      - name: Restore solc-select cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.solc-select
          key: ${{ runner.os }}-solc-select-${{ hashFiles('config/parity-target.json') }}
          restore-keys: |
            ${{ runner.os }}-solc-select-

      - name: Install solc
        run: ./scripts/run_with_timeout.sh MORPHO_SOLC_INSTALL_TIMEOUT_SEC 600 "Install solc" -- ./scripts/install_solc.sh 0.8.28
      - name: Check full toolchain readiness
        run: ./scripts/run_with_timeout.sh MORPHO_PARITY_TARGET_VALIDATE_TIMEOUT_SEC 300 "Check full toolchain readiness" -- ./scripts/check_toolchain_readiness.sh --require lean --require foundry --require solc

      - name: Compile Morpho Verity artifact and enforce artifact gate
        run: ./scripts/run_with_timeout.sh MORPHO_VERITY_PARITY_CHECK_TIMEOUT_SEC 13800 "Artifact preflight gate" -- ./scripts/check_input_mode_parity.sh
        env:
          LEAN_NUM_THREADS: 4
          MORPHO_VERITY_PARITY_OUT_DIR: out/parity-shared
          MORPHO_VERITY_SKIP_BUILD: "1"

      - name: Validate prepared EDSL artifact bundle
        run: ./scripts/run_with_timeout.sh MORPHO_PARITY_TARGET_VALIDATE_TIMEOUT_SEC 300 "Validate prepared EDSL artifact bundle" -- python3 scripts/check_prepared_verity_artifact_bundle.py --artifact-dir out/parity-shared --require-rewrite

      - name: Upload validated EDSL artifact bundle
        uses: actions/upload-artifact@v4
        with:
          name: verity-edsl-artifacts
          path: out/parity-shared
          if-no-files-found: error

  verity-compiled-tests:
    name: Verity compiled artifact smoke tests (Foundry)
    runs-on: ubuntu-latest
    needs: [verity-build, parity-target, verity-compiler-artifacts]
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 1
          persist-credentials: false
          submodules: recursive

      - name: Load CI timeout defaults
        run: cat config/ci-timeout-defaults.env >> "$GITHUB_ENV"

      - name: Restore Lean/Lake cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.elan
            ~/.lake
            .lake/packages
            .lake/build
          key: ${{ runner.os }}-lean-lake-${{ hashFiles('lean-toolchain', 'lake-manifest.json', 'lakefile.lean') }}
          restore-keys: |
